name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: Format and Lint
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '22'

    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        version: 10

    - name: Cache pnpm store
      uses: actions/cache@v6
      with:
        path: ~/.local/share/pnpm/store
        key: ${{ runner.os }}-pnpm-ui-${{ hashFiles('ui/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-ui-

    - name: Install UI dependencies
      working-directory: ui
      run: pnpm install --frozen-lockfile

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo registry
      uses: actions/cache@v6
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-

    - name: Cache cargo index
      uses: actions/cache@v6
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-index-

    - name: Cache target directory
      uses: actions/cache@v6
      with:
        path: target
        key: ${{ runner.os }}-target-ci-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-target-ci-

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

  docs:
    name: Docs Build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '22'

    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        version: 10

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Setup pnpm cache
      uses: actions/cache@v6
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      working-directory: docs
      run: pnpm install --frozen-lockfile

    - name: Build docs
      working-directory: docs
      run: pnpm run build

  # On PRs, run the examples only after format, lint, and docs pass.
  # On main, examples run via the CI -> Tests -> Examples workflow_run chain.
  examples:
    name: Examples
    needs: [ci, docs]
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/examples.yml
